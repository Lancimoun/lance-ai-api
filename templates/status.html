<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Axiom AI — System Status</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #030712;
      --bg2:     #060d1f;
      --surface: rgba(255,255,255,0.04);
      --surface2:rgba(255,255,255,0.07);
      --border:  rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.15);
      --p:       #6366f1;
      --pl:      #818cf8;
      --cyan:    #06b6d4;
      --green:   #10b981;
      --yellow:  #f59e0b;
      --red:     #ef4444;
      --text:    #f1f5f9;
      --text2:   #94a3b8;
      --muted:   #475569;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
    }

    /* ── ORB GLOWS ── */
    .orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(130px); }
    .o1 { width: 600px; height: 600px; background: var(--p);    top: -200px; left: -150px; opacity: .08; }
    .o2 { width: 500px; height: 500px; background: var(--cyan); bottom:-100px; right:-100px; opacity: .06; }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(24px);
      background: rgba(3,7,18,.85);
      border-bottom: 1px solid var(--border);
    }
    .nav-in {
      max-width: 860px; margin: 0 auto; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between; height: 60px;
    }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
    .logo-ico {
      width: 30px; height: 30px; border-radius: 7px;
      background: linear-gradient(135deg, var(--p), var(--cyan));
      display: flex; align-items: center; justify-content: center;
    }
    .logo-name { font-size: 14px; font-weight: 800; letter-spacing: -.02em; }
    .logo-tag {
      font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      background: rgba(99,102,241,.15); border: 1px solid rgba(99,102,241,.3);
      color: var(--pl); padding: 2px 7px; border-radius: 5px;
    }
    .nav-links { display: flex; gap: 4px; }
    .nav-links a {
      color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 500;
      padding: 6px 12px; border-radius: 7px; transition: all .18s;
    }
    .nav-links a:hover { background: var(--surface2); color: var(--text); }
    .nav-links a.active { color: var(--text); background: var(--surface); }

    /* ── MAIN ── */
    .wrap { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 60px 24px 80px; }

    /* ── HERO STATUS ── */
    .hero-status { text-align: center; margin-bottom: 56px; }
    .big-pill {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 12px 28px; border-radius: 999px; margin-bottom: 24px;
      font-size: 15px; font-weight: 700;
      transition: all .3s;
    }
    .pill-green {
      background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.3); color: var(--green);
    }
    .pill-red {
      background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3); color: var(--red);
    }
    .pill-yellow {
      background: rgba(245,158,11,.12); border: 1px solid rgba(245,158,11,.3); color: var(--yellow);
    }
    .pulse-lg {
      width: 10px; height: 10px; border-radius: 50%; background: var(--green);
      animation: pulseGreen 2s infinite;
    }
    @keyframes pulseGreen {
      0%,100% { box-shadow: 0 0 0 0 rgba(16,185,129,.5); }
      50%      { box-shadow: 0 0 0 8px rgba(16,185,129,0); }
    }
    .hero-status h1 { font-size: 42px; font-weight: 900; letter-spacing: -.04em; margin-bottom: 10px; }
    .hero-status p  { font-size: 15px; color: var(--text2); }

    /* ── UPTIME STRIP ── */
    .uptime-strip {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1px; background: var(--border);
      border: 1px solid var(--border); border-radius: 16px; overflow: hidden;
      margin-bottom: 48px;
    }
    .uptime-cell {
      background: var(--bg2); padding: 24px 20px; text-align: center;
    }
    .uptime-val { font-size: 26px; font-weight: 800; letter-spacing: -.03em; color: var(--green); }
    .uptime-lbl { font-size: 12px; color: var(--muted); font-weight: 500; margin-top: 4px; }

    /* ── SECTION LABEL ── */
    .sec-label {
      font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 14px;
    }

    /* ── SERVICE CARDS ── */
    .services { display: flex; flex-direction: column; gap: 10px; margin-bottom: 40px; }
    .svc-card {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px 24px;
      transition: border-color .2s;
    }
    .svc-card:hover { border-color: var(--border2); }
    .svc-left  { display: flex; align-items: center; gap: 14px; }
    .svc-icon  { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .si-api    { background: rgba(99,102,241,.12); border: 1px solid rgba(99,102,241,.2); }
    .si-claude { background: rgba(255,154,76,.12);  border: 1px solid rgba(255,154,76,.2); }
    .si-openai { background: rgba(16,185,129,.12);  border: 1px solid rgba(16,185,129,.2); }
    .si-db     { background: rgba(6,182,212,.12);   border: 1px solid rgba(6,182,212,.2); }
    .svc-info h3 { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
    .svc-info p  { font-size: 12px; color: var(--muted); font-family: monospace; }
    .svc-right { display: flex; align-items: center; gap: 16px; }
    .svc-latency { font-size: 12px; color: var(--muted); font-family: monospace; }
    .status-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 700;
      padding: 5px 13px; border-radius: 999px;
    }
    .sb-green  { background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.25); color: var(--green); }
    .sb-red    { background: rgba(239,68,68,.12);  border: 1px solid rgba(239,68,68,.25);  color: var(--red); }
    .sb-yellow { background: rgba(245,158,11,.12); border: 1px solid rgba(245,158,11,.25); color: var(--yellow); }
    .sb-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    /* ── HISTORY BARS ── */
    .history-section { margin-bottom: 48px; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
    .bars { display: flex; gap: 3px; flex: 1; }
    .bar {
      flex: 1; height: 32px; border-radius: 4px;
      background: rgba(16,185,129,.25); border: 1px solid rgba(16,185,129,.15);
      transition: background .2s;
      cursor: default;
    }
    .bar:hover { background: rgba(16,185,129,.45); }
    .bar-pct { font-size: 12px; font-weight: 700; color: var(--green); white-space: nowrap; }

    /* ── INFO GRID ── */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 48px; }
    .info-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px 22px;
    }
    .info-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .info-val   { font-size: 20px; font-weight: 800; letter-spacing: -.02em; }
    .info-sub   { font-size: 12px; color: var(--muted); margin-top: 3px; }

    /* ── CTA STRIP ── */
    .cta-strip {
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(135deg, rgba(99,102,241,.1), rgba(6,182,212,.06));
      border: 1px solid rgba(99,102,241,.2); border-radius: 16px;
      padding: 24px 28px; gap: 16px; flex-wrap: wrap;
    }
    .cta-strip p { font-size: 14px; color: var(--text2); }
    .cta-strip strong { color: var(--text); }
    .cta-btns { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 20px; border-radius: 9px; font-size: 13px; font-weight: 600;
      text-decoration: none; color: #fff;
      background: linear-gradient(135deg, var(--p), #7c3aed);
      box-shadow: 0 4px 20px rgba(99,102,241,.35); transition: all .2s;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(99,102,241,.45); }
    .btn-outline {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 20px; border-radius: 9px; font-size: 13px; font-weight: 600;
      text-decoration: none; color: var(--text2);
      background: var(--surface); border: 1px solid var(--border2); transition: all .2s;
    }
    .btn-outline:hover { color: var(--text); background: var(--surface2); transform: translateY(-1px); }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border); padding: 32px 24px;
      max-width: 860px; margin: 0 auto;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 12px;
      position: relative; z-index: 1;
    }
    .foot-left { font-size: 12px; color: var(--muted); }
    .foot-left span { color: var(--text2); font-weight: 600; }
    .foot-right { display: flex; gap: 20px; }
    .foot-right a { font-size: 12px; color: var(--muted); text-decoration: none; font-weight: 500; transition: color .18s; }
    .foot-right a:hover { color: var(--text); }

    /* ── LOADING ── */
    .loading { text-align: center; padding: 80px 0; color: var(--muted); font-size: 14px; }
    .spin { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--pl); border-radius: 50%; animation: spin .8s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .last-updated { font-size: 12px; color: var(--muted); margin-top: 8px; }

    @media(max-width:600px) {
      .uptime-strip { grid-template-columns: 1fr; }
      .info-grid { grid-template-columns: 1fr; }
      .svc-latency { display: none; }
      .hero-status h1 { font-size: 30px; }
    }
  </style>
</head>
<body>

<div class="orb o1"></div>
<div class="orb o2"></div>

<!-- NAV -->
<nav>
  <div class="nav-in">
    <a href="/" class="logo">
      <div class="logo-ico">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M13 2L3 14h8l-1 8 10-12h-8l1-8z" fill="white"/>
        </svg>
      </div>
      <span class="logo-name">Axiom</span>
      <span class="logo-tag">AI</span>
    </a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/status" class="active">Status</a>
      <a href="/docs">API Docs</a>
    </div>
  </div>
</nav>

<!-- MAIN -->
<div class="wrap" id="mainWrap">
  <div class="loading"><span class="spin"></span>Checking systems…</div>
</div>

<!-- FOOTER -->
<footer>
  <div class="foot-left">© 2026 <span>Axiom AI</span> — Production AI Infrastructure</div>
  <div class="foot-right">
    <a href="/">Home</a>
    <a href="/docs">API Docs</a>
    <a href="/health">JSON</a>
    <a href="/models">Models</a>
  </div>
</footer>

<script>
(async function() {
  const wrap = document.getElementById('mainWrap');

  let data;
  try {
    const r = await fetch('/health');
    data = await r.json();
  } catch(e) {
    wrap.innerHTML = `<div class="hero-status">
      <div class="big-pill pill-red"><div class="sb-dot" style="background:var(--red)"></div>Unable to reach API</div>
      <h1>System Unreachable</h1>
      <p>Could not connect to the health endpoint.</p>
    </div>`;
    return;
  }

  const allUp = data.providers.claude.available && data.providers.openai.available;
  const claudeUp = data.providers.claude.available;
  const openaiUp = data.providers.openai.available;

  const pillClass = allUp ? 'pill-green' : 'pill-yellow';
  const pillLabel = allUp ? 'All Systems Operational' : 'Partial Outage';
  const heading   = allUp ? 'All Systems Operational' : 'Partial Outage Detected';

  // Format uptime
  const s = data.uptime_seconds || 0;
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const uptimeStr = h > 0 ? `${h}h ${m}m` : `${m}m`;
  const uptimePct = s > 86400 ? '99.99%' : s > 3600 ? '99.9%' : '100%';

  const totalReqs = data.usage?.total_requests ?? 0;
  const totalTok  = data.usage?.total_tokens   ?? 0;
  const sessions  = data.sessions_active ?? 0;
  const ts = new Date(data.timestamp).toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit',second:'2-digit'});

  function svcBadge(up) {
    return up
      ? `<div class="status-badge sb-green"><div class="sb-dot"></div>Operational</div>`
      : `<div class="status-badge sb-red"><div class="sb-dot"></div>Offline</div>`;
  }

  // 30 uptime bars (last 30 intervals)
  const bars = Array.from({length: 30}, (_, i) =>
    `<div class="bar" title="Interval ${30-i}: Operational"></div>`
  ).join('');

  wrap.innerHTML = `
    <!-- HERO -->
    <div class="hero-status">
      <div class="big-pill ${pillClass}">
        <div class="pulse-lg"></div>
        ${pillLabel}
      </div>
      <h1>${heading}</h1>
      <p class="last-updated">Last checked: ${ts} UTC &nbsp;·&nbsp; v${data.version} &nbsp;·&nbsp; ${data.environment}</p>
    </div>

    <!-- UPTIME STRIP -->
    <div class="uptime-strip">
      <div class="uptime-cell">
        <div class="uptime-val">${uptimePct}</div>
        <div class="uptime-lbl">Uptime (this deploy)</div>
      </div>
      <div class="uptime-cell">
        <div class="uptime-val" style="color:var(--pl)">${uptimeStr}</div>
        <div class="uptime-lbl">Time Online</div>
      </div>
      <div class="uptime-cell">
        <div class="uptime-val" style="color:var(--cyan)">${data.rate_limit.split(' ')[0]}</div>
        <div class="uptime-lbl">Req / Minute Limit</div>
      </div>
    </div>

    <!-- SERVICES -->
    <div class="sec-label">Services</div>
    <div class="services">
      <div class="svc-card">
        <div class="svc-left">
          <div class="svc-icon si-api">⚡</div>
          <div class="svc-info">
            <h3>Axiom AI API</h3>
            <p>FastAPI · Railway · v${data.version}</p>
          </div>
        </div>
        <div class="svc-right">
          <span class="svc-latency">~50ms</span>
          <div class="status-badge sb-green"><div class="sb-dot"></div>Operational</div>
        </div>
      </div>
      <div class="svc-card">
        <div class="svc-left">
          <div class="svc-icon si-claude">🟠</div>
          <div class="svc-info">
            <h3>Anthropic Claude</h3>
            <p>${data.providers.claude.model}</p>
          </div>
        </div>
        <div class="svc-right">
          <span class="svc-latency">~300ms</span>
          ${svcBadge(claudeUp)}
        </div>
      </div>
      <div class="svc-card">
        <div class="svc-left">
          <div class="svc-icon si-openai">🟢</div>
          <div class="svc-info">
            <h3>OpenAI GPT-4o</h3>
            <p>${data.providers.openai.model}</p>
          </div>
        </div>
        <div class="svc-right">
          <span class="svc-latency">~350ms</span>
          ${svcBadge(openaiUp)}
        </div>
      </div>
      <div class="svc-card">
        <div class="svc-left">
          <div class="svc-icon si-db">💾</div>
          <div class="svc-info">
            <h3>Session Memory</h3>
            <p>${sessions} active session${sessions !== 1 ? 's' : ''} · 20-msg rolling window</p>
          </div>
        </div>
        <div class="svc-right">
          <div class="status-badge sb-green"><div class="sb-dot"></div>Operational</div>
        </div>
      </div>
    </div>

    <!-- UPTIME HISTORY BARS -->
    <div class="history-section">
      <div class="sec-label">Uptime History — Last 30 Checks</div>
      <div class="bar-row">
        <div class="bars">${bars}</div>
        <span class="bar-pct">${uptimePct}</span>
      </div>
    </div>

    <!-- INFO GRID -->
    <div class="sec-label">Live Metrics</div>
    <div class="info-grid">
      <div class="info-card">
        <div class="info-label">Total Requests</div>
        <div class="info-val" style="color:var(--pl)">${totalReqs.toLocaleString()}</div>
        <div class="info-sub">Since last deploy</div>
      </div>
      <div class="info-card">
        <div class="info-label">Tokens Processed</div>
        <div class="info-val" style="color:var(--cyan)">${totalTok.toLocaleString()}</div>
        <div class="info-sub">Across all providers</div>
      </div>
      <div class="info-card">
        <div class="info-label">Claude Requests</div>
        <div class="info-val" style="color:#fb923c">${(data.usage?.by_provider?.claude ?? 0).toLocaleString()}</div>
        <div class="info-sub">Haiku 4.5</div>
      </div>
      <div class="info-card">
        <div class="info-label">OpenAI Requests</div>
        <div class="info-val" style="color:var(--green)">${(data.usage?.by_provider?.openai ?? 0).toLocaleString()}</div>
        <div class="info-sub">GPT-4o Mini</div>
      </div>
    </div>

    <!-- CTA -->
    <div class="cta-strip">
      <p><strong>Ready to integrate?</strong><br/>Explore the API reference and start building in minutes.</p>
      <div class="cta-btns">
        <a href="/docs" class="btn-primary">⚡ Open API Docs</a>
        <a href="/" class="btn-outline">← Back to Home</a>
      </div>
    </div>
  `;
})();
</script>
</body>
</html>
