<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Axiom AI — API Reference</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:    #030712;
      --bg2:   #060d1f;
      --p:     #6366f1;
      --pl:    #818cf8;
      --cyan:  #06b6d4;
      --green: #10b981;
      --border: rgba(255,255,255,0.08);
      --text:  #f1f5f9;
      --text2: #94a3b8;
    }
    html, body { height: 100%; background: var(--bg); }

    /* ── BRANDED NAV ── */
    .ax-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 99999;
      height: 56px;
      backdrop-filter: blur(24px) saturate(180%);
      background: rgba(3,7,18,.92);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
    }
    /* glowing top line */
    .ax-nav::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--p), var(--cyan), transparent);
      opacity: .6;
    }
    .ax-left  { display: flex; align-items: center; gap: 10px; }
    .ax-logo  {
      width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--p), var(--cyan));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 18px rgba(99,102,241,.5);
    }
    .ax-name  { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 800; letter-spacing: -.02em; color: var(--text); }
    .ax-badge {
      font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      background: rgba(99,102,241,.15); border: 1px solid rgba(99,102,241,.3);
      color: var(--pl); padding: 2px 7px; border-radius: 5px;
    }
    .ax-sep   { color: rgba(255,255,255,.18); font-size: 18px; margin: 0 2px; }
    .ax-page  { font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text2); font-weight: 500; }

    .ax-right { display: flex; align-items: center; gap: 8px; }
    .ax-pill  {
      display: flex; align-items: center; gap: 5px; padding: 4px 12px;
      background: rgba(16,185,129,.10); border: 1px solid rgba(16,185,129,.22);
      border-radius: 999px; font-size: 11px; font-weight: 600; color: var(--green);
      font-family: 'Inter', sans-serif;
    }
    .ax-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.6)} 50%{box-shadow:0 0 0 5px rgba(16,185,129,0)} }
    .ax-btn {
      display: flex; align-items: center; gap: 6px; text-decoration: none;
      font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
      padding: 5px 13px; border-radius: 7px; transition: all .18s;
    }
    .ax-btn-ghost {
      color: var(--text2); background: rgba(255,255,255,.04); border: 1px solid var(--border);
    }
    .ax-btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,.18); }
    .ax-btn-primary {
      color: #fff; background: var(--p); border: 1px solid transparent;
      box-shadow: 0 2px 12px rgba(99,102,241,.35);
    }
    .ax-btn-primary:hover { background: var(--pl); transform: translateY(-1px); }

    /* provider mini-badges in nav */
    .ax-providers { display: flex; gap: 4px; }
    .pvd {
      font-size: 9px; font-weight: 700; letter-spacing: .05em; padding: 2px 7px;
      border-radius: 4px; font-family: 'Inter', sans-serif;
    }
    .pvd-c { background:rgba(251,146,60,.12); color:#fb923c; border:1px solid rgba(251,146,60,.2); }
    .pvd-o { background:rgba(16,185,129,.12); color:#10b981; border:1px solid rgba(16,185,129,.2); }
    .pvd-g { background:rgba(79,156,249,.12);  color:#4f9cf9; border:1px solid rgba(79,156,249,.2); }
    .pvd-q { background:rgba(168,85,247,.12);  color:#a855f7; border:1px solid rgba(168,85,247,.2); }

    /* ── SCALAR CONTAINER ── */
    #api-ref {
      padding-top: 56px; /* offset for fixed nav */
      min-height: 100vh;
    }

    /* ── SCALAR DEEP OVERRIDES ── */
    /* Make backgrounds match Axiom brand perfectly */
    .light-mode,
    :root {
      --scalar-color-1:           #f1f5f9;
      --scalar-color-2:           #94a3b8;
      --scalar-color-3:           #64748b;
      --scalar-color-accent:      #6366f1;
      --scalar-color-accent-sec:  #06b6d4;
      --scalar-background-1:      #030712;
      --scalar-background-2:      #060d1f;
      --scalar-background-3:      #0a1628;
      --scalar-background-accent: rgba(99,102,241,0.12);
      --scalar-border-color:      rgba(255,255,255,0.08);
      --scalar-border-color-dark: rgba(255,255,255,0.14);
      --scalar-shadow-1:          0 4px 24px rgba(0,0,0,.6);
      --scalar-shadow-2:          0 8px 48px rgba(0,0,0,.8);
      --scalar-scrollbar-color:         rgba(255,255,255,0.14);
      --scalar-scrollbar-color-active:  rgba(99,102,241,0.6);
      --scalar-font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --scalar-font-code: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }
    /* scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--scalar-background-2); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.14); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,.5); }
  </style>
</head>
<body>

<!-- ── BRANDED NAV ── -->
<nav class="ax-nav">
  <div class="ax-left">
    <a href="/" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
      <div class="ax-logo">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M13 2L3 14h8l-1 8 10-12h-8l1-8z" fill="white"/>
        </svg>
      </div>
      <span class="ax-name">Axiom</span>
      <span class="ax-badge">AI</span>
    </a>
    <span class="ax-sep">/</span>
    <span class="ax-page">API Reference</span>
  </div>

  <div class="ax-right">
    <div class="ax-providers">
      <span class="pvd pvd-c">Claude</span>
      <span class="pvd pvd-o">OpenAI</span>
      <span class="pvd pvd-g">Gemini</span>
      <span class="pvd pvd-q">Groq</span>
    </div>
    <div class="ax-pill"><div class="ax-dot"></div>v4.0 Live</div>
    <a href="/models" class="ax-btn ax-btn-primary">&#128225; Models</a>
    <a href="/" class="ax-btn ax-btn-ghost">&#8592; Home</a>
  </div>
</nav>

<!-- ── SCALAR API REFERENCE ── -->
<div id="api-ref"></div>

<script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference@latest"></script>
<script>
Scalar.createApiReference('#api-ref', {
  url: '/openapi.json',

  /* ── Appearance ── */
  theme:               'deepSpace',
  darkMode:            true,
  forceDarkModeState:  'dark',
  hideDarkModeToggle:  true,
  layout:              'modern',
  withDefaultFonts:    false,   /* we load Inter ourselves */

  /* ── Sidebar ── */
  showSidebar:          true,
  hideSearch:           false,
  searchHotKey:         'k',
  defaultOpenFirstTag:  true,
  hideClientButton:     false,

  /* ── HTTP Clients ── */
  defaultHttpClient: {
    targetKey: 'shell',
    clientKey: 'curl',
  },
  hiddenClients: ['unirest', 'clj_http', 'restsharp', 'native', 'cohttp'],

  /* ── Models / Schema ── */
  hideModels:                    false,
  expandAllModelSections:        false,
  orderRequiredPropertiesFirst:  true,
  operationTitleSource:          'summary',
  showOperationId:               false,

  /* ── Meta ── */
  metaData: {
    title:       'Axiom AI — API Reference',
    description: 'Production AI infrastructure: Claude, GPT-4o, Gemini, and Groq behind one unified API. 4 providers. 9 models. One endpoint.',
    ogTitle:     'Axiom AI API Reference',
    ogImage:     'https://axiom-ai-production-aaec.up.railway.app/og.png',
  },

  /* ── Brand override CSS ── */
  customCss: `
    /* === FONTS === */
    * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif !important; }
    code, pre, .cm-editor, .scalar-code-block { font-family: 'SF Mono','Fira Code',monospace !important; }

    /* === BACKGROUNDS === */
    .scalar-app                { background: #030712 !important; }
    .t-doc__sidebar            { background: #060d1f !important; border-right: 1px solid rgba(255,255,255,.07) !important; }
    .scalar-card               { background: #060d1f !important; border: 1px solid rgba(255,255,255,.08) !important; }
    .references-navigation     { background: #060d1f !important; }

    /* === PRIMARY ACCENT — indigo ↔ cyan gradient === */
    a                              { color: #818cf8 !important; }
    a:hover                        { color: #c4b5fd !important; }
    .active-link, [aria-selected]  { color: #818cf8 !important; background: rgba(99,102,241,.12) !important; border-left: 2px solid #6366f1 !important; }

    /* === HTTP METHOD BADGES === */
    .scalar-method-badge[data-method="get"]    { background: rgba(16,185,129,.18) !important; color: #34d399 !important; border: 1px solid rgba(16,185,129,.3) !important; font-weight: 800 !important; }
    .scalar-method-badge[data-method="post"]   { background: rgba(99,102,241,.18) !important; color: #a5b4fc !important; border: 1px solid rgba(99,102,241,.3) !important; font-weight: 800 !important; }
    .scalar-method-badge[data-method="delete"] { background: rgba(239,68,68,.18)  !important; color: #fca5a5 !important; border: 1px solid rgba(239,68,68,.3)  !important; font-weight: 800 !important; }
    .scalar-method-badge[data-method="put"]    { background: rgba(245,158,11,.18) !important; color: #fcd34d !important; border: 1px solid rgba(245,158,11,.3) !important; font-weight: 800 !important; }
    .scalar-method-badge[data-method="patch"]  { background: rgba(6,182,212,.18)  !important; color: #67e8f9 !important; border: 1px solid rgba(6,182,212,.3)  !important; font-weight: 800 !important; }

    /* === BUTTONS === */
    .scalar-button-primary, button[type="submit"] {
      background: linear-gradient(135deg, #6366f1, #7c3aed) !important;
      border: none !important; color: #fff !important;
      box-shadow: 0 4px 16px rgba(99,102,241,.35) !important;
      border-radius: 8px !important; font-weight: 600 !important;
    }
    .scalar-button-primary:hover { opacity: .88 !important; transform: translateY(-1px) !important; }

    /* === INPUTS ===  */
    input, textarea, select {
      background: rgba(255,255,255,.05) !important;
      border: 1px solid rgba(255,255,255,.12) !important;
      color: #f1f5f9 !important; border-radius: 7px !important;
    }
    input:focus, textarea:focus {
      border-color: #6366f1 !important;
      box-shadow: 0 0 0 3px rgba(99,102,241,.15) !important;
      outline: none !important;
    }

    /* === CODE BLOCKS (right panel) === */
    pre, .scalar-code-block, [class*="codeblock"] {
      background: #0a1628 !important;
      border: 1px solid rgba(255,255,255,.07) !important;
      border-radius: 10px !important;
    }
    .cm-editor { background: #0a1628 !important; }
    .cm-content { color: #e2e8f0 !important; }
    .cm-string   { color: #34d399 !important; }  /* strings  → green   */
    .cm-keyword  { color: #818cf8 !important; }  /* keywords → indigo  */
    .cm-number   { color: #fb923c !important; }  /* numbers  → orange  */
    .cm-comment  { color: #475569 !important; }  /* comments → muted   */
    .cm-property { color: #67e8f9 !important; }  /* keys     → cyan    */

    /* === RESPONSE CODES === */
    .response-code-2xx { color: #34d399 !important; font-weight: 700 !important; }
    .response-code-4xx { color: #fca5a5 !important; font-weight: 700 !important; }
    .response-code-5xx { color: #fcd34d !important; font-weight: 700 !important; }

    /* === SEARCH BAR === */
    [class*="search"] input {
      background: rgba(255,255,255,.06) !important;
      border: 1px solid rgba(255,255,255,.12) !important;
      border-radius: 9px !important; color: #f1f5f9 !important;
    }
    [class*="search"] input::placeholder { color: #475569 !important; }

    /* === SCHEMA TYPES === */
    .scalar-schema-type  { color: #06b6d4 !important; font-size: 12px !important; }
    .scalar-schema-title { color: #818cf8 !important; font-weight: 600 !important; }

    /* === SECTION HEADINGS === */
    h1 { font-size: 28px !important; font-weight: 900 !important; letter-spacing: -.03em !important; color: #f1f5f9 !important; }
    h2 { font-size: 20px !important; font-weight: 800 !important; color: #f1f5f9 !important; }
    h3 { font-size: 15px !important; font-weight: 700 !important; color: #e2e8f0 !important; }

    /* === DIVIDERS === */
    hr, [class*="divider"] { border-color: rgba(255,255,255,.07) !important; }

    /* === TAG GROUP HEADERS === */
    [class*="tag-group-header"], [class*="section-heading"] {
      color: #94a3b8 !important;
      font-size: 10px !important; font-weight: 800 !important;
      letter-spacing: .12em !important; text-transform: uppercase !important;
      padding: 16px 0 8px !important;
      border-top: 1px solid rgba(255,255,255,.06) !important;
    }

    /* === OPERATION CARDS === */
    [class*="endpoint-row"], [class*="operation"] {
      border-radius: 10px !important;
      transition: border-color .18s, box-shadow .18s !important;
    }
    [class*="endpoint-row"]:hover {
      border-color: rgba(99,102,241,.3) !important;
      box-shadow: 0 4px 24px rgba(0,0,0,.4) !important;
    }

    /* === SCROLLBAR === */
    ::-webkit-scrollbar { width: 5px !important; height: 5px !important; }
    ::-webkit-scrollbar-track { background: #060d1f !important; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.14) !important; border-radius: 3px !important; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,.5) !important; }

    /* === COPY BUTTON === */
    [class*="copy"] button {
      background: rgba(99,102,241,.12) !important; border: 1px solid rgba(99,102,241,.25) !important;
      color: #818cf8 !important; border-radius: 6px !important;
    }
    [class*="copy"] button:hover { background: rgba(99,102,241,.22) !important; }

    /* === TABS (code language switcher) === */
    [role="tab"]              { color: #94a3b8 !important; border-bottom: 2px solid transparent !important; }
    [role="tab"][aria-selected="true"] { color: #818cf8 !important; border-bottom-color: #6366f1 !important; }
    [role="tablist"]          { border-bottom: 1px solid rgba(255,255,255,.08) !important; }

    /* === AUTH BADGE === */
    [class*="auth-badge"], [class*="security"] {
      background: rgba(245,158,11,.10) !important; border: 1px solid rgba(245,158,11,.2) !important;
      color: #fbbf24 !important; border-radius: 5px !important;
    }

    /* === REQUIRED BADGE === */
    [class*="required"] { color: #f87171 !important; font-weight: 700 !important; }

    /* === DEPRECATED === */
    [class*="deprecated"] { color: #475569 !important; text-decoration: line-through !important; }
  `,
});
</script>
</body>
</html>
