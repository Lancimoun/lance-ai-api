<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Axiom AI — API Reference</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #030712;
      --bg2:     #060d1f;
      --bg3:     #0a1628;
      --border:  rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --p:       #6366f1;
      --pl:      #818cf8;
      --cyan:    #06b6d4;
      --green:   #10b981;
      --amber:   #f59e0b;
      --red:     #ef4444;
      --text:    #f1f5f9;
      --text2:   #94a3b8;
      --muted:   #475569;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; min-height: 100vh;
    }

    /* ── TOP NAV ── */
    .top-nav {
      position: sticky; top: 0; z-index: 9999;
      backdrop-filter: blur(24px) saturate(200%);
      background: rgba(3,7,18,.88);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .nav-inner {
      max-width: 100%; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between; height: 58px;
    }
    .nav-left  { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 28px; height: 28px; border-radius: 7px;
      background: linear-gradient(135deg, var(--p), var(--cyan));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 14px rgba(99,102,241,.35); flex-shrink: 0;
    }
    .nav-title  { font-size: 14px; font-weight: 800; letter-spacing: -.02em; }
    .nav-badge  {
      font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      background: rgba(99,102,241,.15); border: 1px solid rgba(99,102,241,.3);
      color: var(--pl); padding: 2px 7px; border-radius: 5px;
    }
    .nav-sep  { color: var(--border2); font-size: 18px; margin: 0 2px; }
    .nav-page { font-size: 13px; color: var(--text2); font-weight: 500; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .status-pill {
      display: flex; align-items: center; gap: 5px; padding: 4px 12px;
      background: rgba(16,185,129,.10); border: 1px solid rgba(16,185,129,.22);
      border-radius: 999px; font-size: 11px; font-weight: 600; color: var(--green);
    }
    .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.6)} 50%{box-shadow:0 0 0 5px rgba(16,185,129,0)} }
    .btn-home {
      display: flex; align-items: center; gap: 6px; text-decoration: none;
      font-size: 12px; font-weight: 600; color: var(--text2);
      background: rgba(255,255,255,.04); border: 1px solid var(--border);
      padding: 5px 13px; border-radius: 7px; transition: all .18s;
    }
    .btn-home:hover { color: var(--text); border-color: var(--border2); background: rgba(255,255,255,.07); }
    .btn-models {
      display: flex; align-items: center; gap: 6px; text-decoration: none;
      font-size: 12px; font-weight: 600; color: #fff;
      background: var(--p); padding: 5px 13px; border-radius: 7px;
      box-shadow: 0 2px 10px rgba(99,102,241,.3); transition: all .18s;
    }
    .btn-models:hover { background: var(--pl); transform: translateY(-1px); }

    /* ── REDOC WRAPPER ── */
    #redoc-container { flex: 1; }

    /* ── REDOC DARK OVERRIDES ── */

    /* Main panel background */
    .redoc-wrap { background: var(--bg) !important; }
    [data-role="search-input-field"] { background: rgba(255,255,255,.06) !important; color: var(--text) !important; border: 1px solid var(--border2) !important; border-radius: 8px !important; }

    /* Sidebar */
    .menu-content { background: var(--bg2) !important; border-right: 1px solid var(--border) !important; }
    label[role="menuitem"] { color: var(--text2) !important; font-family: 'Inter' !important; }
    label[role="menuitem"]:hover { background: rgba(255,255,255,.04) !important; color: var(--text) !important; }
    .active > label[role="menuitem"] { background: rgba(99,102,241,.12) !important; color: var(--pl) !important; }
    li[data-item-id] > label { color: var(--text) !important; font-weight: 600 !important; }

    /* Main content */
    .api-content { background: var(--bg) !important; }
    h1,h2,h3,h4,h5 { color: var(--text) !important; font-family: 'Inter' !important; }
    p, li { color: var(--text2) !important; font-family: 'Inter' !important; }
    a { color: var(--pl) !important; }

    /* Operation headers */
    [data-section-id] h2 { color: var(--text) !important; font-weight: 800 !important; }

    /* Code samples panel (right) */
    .react-tabs__tab-panel--selected { background: var(--bg3) !important; }
    .react-tabs__tab { color: var(--text2) !important; font-family: 'Inter' !important; }
    .react-tabs__tab--selected { color: var(--pl) !important; border-bottom: 2px solid var(--p) !important; }

    /* HTTP method badges */
    span[type="get"]    { background: var(--green) !important; }
    span[type="post"]   { background: var(--p) !important; }
    span[type="delete"] { background: var(--red) !important; }
    span[type="put"]    { background: var(--amber) !important; }
    span[type="patch"]  { background: var(--cyan) !important; }

    /* Tables */
    tr { border-bottom: 1px solid var(--border) !important; }
    td, th { background: transparent !important; color: var(--text2) !important; font-family: 'Inter' !important; }
    th { color: var(--muted) !important; font-size: 11px !important; font-weight: 700 !important; letter-spacing: .06em !important; text-transform: uppercase !important; }

    /* Schema / model boxes */
    .sc-eDnWTT { background: var(--bg2) !important; border: 1px solid var(--border) !important; border-radius: 10px !important; }

    /* Inline code */
    code { background: rgba(99,102,241,.10) !important; color: var(--pl) !important; border-radius: 4px !important; padding: 1px 5px !important; font-family: 'SF Mono','Fira Code',monospace !important; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* Provider tag pills in description */
    .provider-pills { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 16px; }
    .pp { font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 7px; }
    .pp-c { background:rgba(251,146,60,.12); color:#fb923c; border:1px solid rgba(251,146,60,.22); }
    .pp-o { background:rgba(16,185,129,.12); color:#10b981; border:1px solid rgba(16,185,129,.22); }
    .pp-g { background:rgba(79,156,249,.12); color:#4f9cf9; border:1px solid rgba(79,156,249,.22); }
    .pp-q { background:rgba(168,85,247,.12); color:#a855f7; border:1px solid rgba(168,85,247,.22); }
  </style>
</head>
<body>

<!-- ── TOP NAV ── -->
<nav class="top-nav">
  <div class="nav-inner">
    <div class="nav-left">
      <a href="/" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;">
        <div class="logo-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M13 2L3 14h8l-1 8 10-12h-8l1-8z" fill="white"/>
          </svg>
        </div>
        <span class="nav-title">Axiom</span>
        <span class="nav-badge">AI</span>
      </a>
      <span class="nav-sep">/</span>
      <span class="nav-page">API Reference</span>
    </div>
    <div class="nav-right">
      <div class="status-pill"><div class="pulse"></div>v4.0 Live</div>
      <a href="/models" class="btn-models">&#128225; Models</a>
      <a href="/" class="btn-home">&#8592; Home</a>
    </div>
  </div>
</nav>

<!-- ── REDOC ── -->
<div id="redoc-container"></div>

<script src="https://cdn.jsdelivr.net/npm/redoc@2.1.5/bundles/redoc.standalone.js"></script>
<script>
Redoc.init(
  '/openapi.json',
  {
    scrollYOffset: 58,           /* offset for sticky nav */
    hideDownloadButton: false,
    expandResponses: '200,201',
    jsonSampleExpandLevel: 2,
    sortPropsAlphabetically: false,
    noAutoAuth: false,
    pathInMiddlePanel: false,
    nativeScrollbars: false,
    theme: {
      spacing: { unit: 5, sectionVertical: 20 },
      breakpoints: { small: '50rem', medium: '85rem', large: '105rem' },
      colors: {
        tonalOffset: 0.3,
        primary:  { main: '#6366f1', light: '#818cf8', dark: '#4f46e5', contrastText: '#ffffff' },
        success:  { main: '#10b981', light: '#34d399', dark: '#059669', contrastText: '#ffffff' },
        warning:  { main: '#f59e0b', light: '#fbbf24', dark: '#d97706', contrastText: '#ffffff' },
        error:    { main: '#ef4444', light: '#f87171', dark: '#dc2626', contrastText: '#ffffff' },
        gray:     { 50: '#f8fafc', 100: '#f1f5f9' },
        border:   { dark: 'rgba(255,255,255,0.12)', light: 'rgba(255,255,255,0.06)' },
        text:     { primary: '#f1f5f9', secondary: '#94a3b8' },
        responses: {
          success:  { color: '#10b981', backgroundColor: 'rgba(16,185,129,0.08)'  },
          error:    { color: '#ef4444', backgroundColor: 'rgba(239,68,68,0.08)'   },
          redirect: { color: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.08)'  },
          info:     { color: '#06b6d4', backgroundColor: 'rgba(6,182,212,0.08)'   }
        },
        http: {
          get:     '#10b981',
          post:    '#6366f1',
          put:     '#f59e0b',
          options: '#94a3b8',
          patch:   '#06b6d4',
          delete:  '#ef4444',
          basic:   '#94a3b8',
          link:    '#06b6d4',
          head:    '#94a3b8'
        }
      },
      schema: {
        linesColor:       'rgba(255,255,255,0.10)',
        defaultDetailsWidth: '75%',
        typeNameColor:    '#06b6d4',
        typeTitleColor:   '#818cf8',
        requireLabelColor:'#ef4444',
        labelsTextSize:   '0.8em',
        nestingSpacing:   '1em'
      },
      typography: {
        fontSize:           '14px',
        lineHeight:         '1.65',
        fontWeightRegular:  '400',
        fontWeightBold:     '700',
        fontWeightLight:    '300',
        fontFamily:         'Inter, -apple-system, BlinkMacSystemFont, sans-serif',
        smoothing:          'antialiased',
        optimizeSpeed:      true,
        headings: {
          fontFamily:   'Inter, -apple-system, sans-serif',
          fontWeight:   '800',
          lineHeight:   '1.2'
        },
        code: {
          fontSize:         '13px',
          fontFamily:       "'SF Mono', 'Fira Code', 'Consolas', monospace",
          lineHeight:       '1.6',
          fontWeight:       '400',
          color:            '#818cf8',
          backgroundColor:  'rgba(99,102,241,0.10)',
          wrap:             true
        },
        links: { color: '#818cf8', visited: '#a78bfa', hover: '#c4b5fd' }
      },
      sidebar: {
        width:                '272px',
        backgroundColor:      '#060d1f',
        textColor:            '#94a3b8',
        activeTextColor:      '#f1f5f9',
        groupItems: {
          activeBackgroundColor: 'rgba(99,102,241,0.12)',
          activeTextColor:       '#f1f5f9',
          textTransform:         'uppercase',
          fontSize:              '11px'
        },
        level1Items: {
          activeBackgroundColor: 'rgba(99,102,241,0.10)',
          activeTextColor:       '#818cf8',
          textTransform:         'none',
          fontSize:              '13px'
        },
        arrow: { size: '1.4em', color: '#475569' }
      },
      logo: { maxHeight: '36px', maxWidth: '180px', gutter: '16px' },
      rightPanel: {
        backgroundColor: '#0a1628',
        textColor:       '#e2e8f0',
        width:           '38%'
      },
      fab: { backgroundColor: '#6366f1', color: '#ffffff' }
    }
  },
  document.getElementById('redoc-container')
);
</script>
</body>
</html>
